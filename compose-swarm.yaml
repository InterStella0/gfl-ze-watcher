x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  reverse:
    image: interstella0/ze-graph:reverse
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-backend}
      FRONTEND_HOST: ${FRONTEND_HOST:-frontend}
      QGIS_HOST: ${QGIS_HOST:-qgis-server}
    volumes:
      - ${MAPS_PATH}:/var/www/frontend/public:ro
      - ${CHARACTERS_PATH}:/var/www/characters:ro
      - ${PUBLIC_FILES_PATH:-/front-gfl/public}:/var/www/public/any:ro
    networks:
      - default
      - dokploy-network
    logging: *default-logging
    deploy:
      placement:
        constraints:
          - node.role == manager

  frontend:
    image: interstella0/ze-graph:frontend
    volumes:
      - thumbnails:/var/www/thumbnails:ro
      - tile_cache:/var/cache/nginx/qgis_tiles
    logging: *default-logging
    deploy:
      replicas: 2
      placement:
        preferences:
          - spread: node.hostname
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - default
      - dokploy-network

  backend:
    image: interstella0/ze-graph:backend
    user: "10001:956"
    extra_hosts:
      - host.docker.internal:host-gateway
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CACHE_THUMBNAIL: /var/www/thumbnails
      STORE_UPLOAD: /var/www/maps
      CHARACTER_STORE_UPLOAD: /var/www/characters
    volumes:
      - thumbnails:/var/www/thumbnails
      - ${MAPS_PATH}:/var/www/maps:rw
      - ${CHARACTERS_PATH}:/var/www/characters:rw
      - ${VAPIDS_PATH}:/app/vapids:ro
    logging: *default-logging
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://backend:3000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.0-alpine
    volumes:
      - redis-data:/data
      - ${REDIS_CONF_PATH}:/usr/local/etc/redis/redis.conf
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    logging: *default-logging
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 3G
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  pfp-provider:
    image: interstella0/ze-graph:pfp-provider
    environment:
      REDIS_URL: ${REDIS_URL}
      STEAM_API_KEY: ${STEAM_API_KEY}
    logging: *default-logging
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  qgis-server:
    image: interstella0/ze-graph:qgis-server
    volumes:
      - ${QGIS_PROJECT_PATH}:/home/qgis/project
    environment:
      LANG: en_EN.UTF-8
      QGIS_PROJECT_FILE: /home/qgis/project/project.qgz
      QGIS_SERVER_LOG_LEVEL: 0
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    logging: *default-logging
    deploy:
      replicas: 2
      placement:
        preferences:
          - spread: node.hostname
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  thumbnails:
  tile_cache:
  redis-data:

networks:
  default:
    driver: overlay
  dokploy-network:
    external: true